services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clustec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-clustec}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clustec}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: thunkar/clustec-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    command:
      ["node", "--experimental-transform-types", "packages/common/src/db/migrate.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clustec}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: thunkar/clustec-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clustec}
      PORT: "3002"
      HOST: "0.0.0.0"
      NODE_ENV: production
      ANALYSIS_INTERVAL_MS: ${ANALYSIS_INTERVAL_MS:-600000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_URL_MAINNET: ${NODE_URL_MAINNET:-}
      L1_RPC_URL_MAINNET: ${L1_RPC_URL_MAINNET:-}
      L1_RPC_URL_SEPOLIA: ${L1_RPC_URL_SEPOLIA:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

  indexer-devnet:
    image: thunkar/clustec-indexer:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/indexer/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clustec}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./configs/networks/devnet.json:/app/config.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  indexer-testnet:
    image: thunkar/clustec-indexer:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/indexer/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clustec}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./configs/networks/testnet.json:/app/config.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  indexer-mainnet:
    image: thunkar/clustec-indexer:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/indexer/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustec}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clustec}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_URL: ${NODE_URL_MAINNET:-}
    volumes:
      - ./configs/networks/mainnet.json:/app/config.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    image: thunkar/clustec-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-:3001}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    depends_on:
      - server

volumes:
  pgdata:
  caddy_data:
  caddy_config:
