name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test (TypeScript)
        run: yarn turbo run test

      - name: Test (Python analyzer)
        run: cd packages/analyzer && uv run pytest tests/ -v

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: thunkar/clustec-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push indexer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/indexer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: thunkar/clustec-indexer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: thunkar/clustec-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.DEPLOY_SSH_PORT || '22' }} ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          bash deploy.sh \
            --host ${{ vars.DEPLOY_HOST }} \
            --user ${{ vars.DEPLOY_USER || 'root' }} \
            --port ${{ vars.DEPLOY_SSH_PORT || '22' }} \
            --key ~/.ssh/deploy_key
