name: Deploy

on:
  push:
    branches: [main]

jobs:
  base-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/arm64
          push: true
          tags: thunkar/clustec-base:latest
          cache-from: type=registry,ref=thunkar/clustec-base:buildcache
          cache-to: type=registry,ref=thunkar/clustec-base:buildcache,mode=max

  docker:
    needs: base-image
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - service: server
            file: packages/server/Dockerfile
            image: thunkar/clustec-server
          - service: indexer
            file: packages/indexer/Dockerfile
            image: thunkar/clustec-indexer
          - service: web
            file: packages/web/Dockerfile
            image: thunkar/clustec-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/arm64
          push: true
          tags: ${{ matrix.image }}:latest
          build-args: BASE_IMAGE=thunkar/clustec-base:latest
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.DEPLOY_SSH_PORT || '22' }} ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          bash deploy.sh \
            --host ${{ vars.DEPLOY_HOST }} \
            --user ${{ vars.DEPLOY_USER || 'root' }} \
            --port ${{ vars.DEPLOY_SSH_PORT || '22' }} \
            --key ~/.ssh/deploy_key
