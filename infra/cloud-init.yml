#cloud-config

package_update: true

packages:
  - curl
  - jq

write_files:
  - path: /opt/clustec/.env
    content: |
      POSTGRES_PASSWORD=${postgres_password}
      POSTGRES_USER=clustec
      POSTGRES_DB=clustec
      ANALYSIS_INTERVAL_MS=600000
      DOMAIN=${domain}
      API_DOMAIN=api.${domain}
      WEB_PORT=443
      ADMIN_PASSWORD=${admin_password}
      JWT_SECRET=${jwt_secret}
      SENTRY_DSN=${sentry_dsn}
  - path: /opt/clustec/docker-compose.override.yml
    content: |
      services:
        web:
          ports:
            - "80:80"
        postgres:
          volumes:
            - /mnt/data/pgdata:/var/lib/postgresql/data

runcmd:
  - mkdir -p /opt/clustec/configs/networks
  # Install Docker from official repo (includes compose plugin)
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
  # Mount the Hetzner volume (automount creates the device, we ensure the mount point)
  - mkdir -p /mnt/data/pgdata
